version: "3.9"

services:
  honeypot:
    build: .
    container_name: cascade-medical-honeypot
    restart: unless-stopped
    ports:
      - "22:22"       # SSH
      - "23:23"       # Telnet
      - "25:25"       # SMTP
      - "88:88"       # Kerberos (AD)
      - "389:389"     # LDAP (AD)
      - "587:587"     # SMTP submission
      - "636:636"     # LDAPS
      - "1433:1433"   # MSSQL
      - "2575:2575"   # HL7 MLLP
      - "3268:3268"   # Global Catalog (AD)
      - "3306:3306"   # MySQL
      - "3389:3389"   # RDP
      - "5900:5900"   # VNC
      - "6379:6379"   # Redis
      - "8080:8080"   # Dashboard (restrict to your IP in NSG!)
      - "9200:9200"   # Elasticsearch
      - "27017:27017" # MongoDB
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./dashboard/templates:/app/dashboard/templates
      - /srv/samba:/srv/samba   # Real Samba shares (from setup_samba.sh)
    environment:
      - BIND_HOST=0.0.0.0
      - SSH_PORT=22
      - RDP_PORT=3389
      - VNC_PORT=5900
      - TELNET_PORT=23
      - MYSQL_PORT=3306
      - MSSQL_PORT=1433
      - REDIS_PORT=6379
      - MONGO_PORT=27017
      - ES_PORT=9200
      - SMTP_PORT=25
      - SMTP_ALT_PORT=587
      - HL7_PORT=2575
      - LDAP_PORT=389
      - LDAPS_PORT=636
      - GC_PORT=3268
      - KRB_PORT=88
      - SMB_PORT=445
      - DASHBOARD_PORT=8080
      # !! SET THIS to your teammate's (Meridian HR) VM private IP !!
      - MERIDIAN_IP=${MERIDIAN_IP:-10.0.0.4}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
    cap_add:
      - NET_BIND_SERVICE
